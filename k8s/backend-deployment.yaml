apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: newsai
spec:
  ports:
    - port: 8000
  selector:
    app: backend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: newsai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: newsai-backend:latest
          imagePullPolicy: Never # For local development with Minikube/Kind
          ports:
            - containerPort: 8000
          env:
            - name: FRONTEND_URL
              value: "http://newsai.local"
            - name: APP_STAGE
              value: "production"
            - name: SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: newsai-secrets
                  key: supabase-url
            - name: SUPABASE_SERVICE_ROLE_KEY
              valueFrom:
                secretKeyRef:
                  name: newsai-secrets
                  key: supabase-key
            - name: SUPABASE_ANON_KEY
              valueFrom:
                secretKeyRef:
                  name: newsai-secrets
                  key: supabase-anon-key
            - name: SUPABASE_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: newsai-secrets
                  key: supabase-jwt-secret
            - name: MISTRAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: newsai-secrets
                  key: mistral-key
            - name: FIRECRAWL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: newsai-secrets
                  key: firecrawl-key
